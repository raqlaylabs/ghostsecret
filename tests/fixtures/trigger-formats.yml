name: All Trigger Formats

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
  workflow_call:
    secrets:
      INHERITED_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ secrets.SCHEDULED_KEY }}"
